<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78 FIT - OOR Solid</title>
    <link href="https://fonts.googleapis.com/css2?family=Staatliches&family=Oswald:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            font-family: 'Oswald', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            cursor: pointer;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
        }

        .container { width: 100%; max-width: 420px; position: relative; z-index: 10; }

        /* --- H1: SOLID WHITE SHINE --- */
        h1 {
            font-family: 'Staatliches', sans-serif;
            font-size: 6rem;
            color: #ffffff;
            text-align: center;
            margin: 0;
            letter-spacing: 4px;
            position: relative;
            display: block;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            overflow: hidden;
        }

        h1::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-25deg);
            animation: shineThrough 5s infinite;
        }

        @keyframes shineThrough {
            0% { left: -150%; }
            25% { left: 150%; }
            100% { left: 150%; }
        }

        /* --- SETLIST SIDEBAR --- */
        .setlist-sidebar {
            flex: 1;
            padding-top: 15px;
            min-width: 300px;
        }

        .setlist-title {
            font-family: 'Staatliches', sans-serif;
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 3px;
            border-bottom: 2px solid #ffffff;
            padding-bottom: 10px;
        }

        .song-item {
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            font-size: 1.1rem;
            color: #ffffff;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s ease-out;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .song-item.show { opacity: 1; transform: translateX(0); }
        .encore-label { color: #ff0000; margin-top: 15px; border-top: 1px solid #333; padding-top: 5px; }

        /* --- CARDS: CLEAN & BOLD --- */
        .card {
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 0; /* Tajam lebih macho */
            margin-top: 20px;
            border-left: 4px solid #ffffff; /* Aksen garis samping biar tegas */
            text-align: center;
        }

        h3 { font-family: 'Staatliches', sans-serif; font-size: 1.5rem; letter-spacing: 2px; margin: 0 0 15px 0; }

        /* --- TIMER CLEAN VERSION --- */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .timer-box { padding: 5px; }
        .timer-box span { font-family: 'Staatliches', sans-serif; font-size: 2.2rem; line-height: 1; }
        .timer-box small { display: block; font-size: 0.7rem; opacity: 0.6; }

        /* --- BUTTONS & INPUT --- */
        button {
            font-family: 'Staatliches', sans-serif;
            width: 100%; padding: 12px; background: #ffffff; color: #000;
            border: none; font-size: 1.4rem; cursor: pointer; transition: 0.2s;
            letter-spacing: 2px;
        }
        button:hover { background: #ff0000; color: #fff; }

        input[type="number"] {
            width: 80%; background: transparent; border: none; border-bottom: 2px solid #333;
            color: #ffffff; font-size: 2.5rem; text-align: center; font-family: 'Staatliches', sans-serif;
            margin-bottom: 10px;
        }
        input[type="number"]:focus { outline: none; border-bottom-color: #fff; }

        .item { display: flex; align-items: center; margin-bottom: 10px; font-size: 1.1rem; text-transform: uppercase; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-right: 15px; accent-color: #ff0000; }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .setlist-sidebar { width: 100%; border-top: 1px solid #333; padding-top: 30px; }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <audio id="themeSong" loop><source src="lagu1.mp3" type="audio/mpeg"></audio>

    <div class="main-wrapper">
        <div class="container">
            <h1>78 FIT</h1>
            
            <div class="card">
                <h3>ROAD TO JAKARTA</h3>
                <div class="timer-grid">
                    <div class="timer-box"><span id="days">00</span><small>DAYS</small></div>
                    <div class="timer-box"><span id="hours">00</span><small>HOURS</small></div>
                    <div class="timer-box"><span id="minutes">00</span><small>MINS</small></div>
                    <div class="timer-box"><span id="seconds">00</span><small>SECS</small></div>
                </div>
            </div>

            <div class="card">
                <h3>BODY WEIGHT</h3>
                <div id="lastWeight" style="font-size: 3.5rem; font-family: 'Staatliches', sans-serif; color: #2ecc71;">--</div>
                <input type="number" id="currentWeight" step="0.1" placeholder="00.0">
                <button onclick="updateWeight()">SAVE BATTLE</button>
            </div>

            <div class="card checklist">
                <h3 style="text-align: center;">DAILY MISSION</h3>
                <div class="item"><input type="checkbox"> PUSH UP 50X</div>
                <div class="item"><input type="checkbox"> WEIGHT LIFTING</div>
                <div class="item"><input type="checkbox"> CARDIO BATTLE</div>
                <div class="item"><input type="checkbox"> NO SNACKS!</div>
            </div>
        </div>

        <div class="setlist-sidebar">
            <div class="setlist-title">DETOX ASIA TOUR 2026 SETLIST</div>
            <div id="setlist-content"></div>
        </div>
    </div>

    <script>
        const song = document.getElementById('themeSong');
        document.body.addEventListener('click', () => { if (song.paused) song.play(); }, { once: true });

        const setlist = [
            "Puppets Can’t Control You (JP)", "The Beginning", "Save Yourself (JP)",
            "NASTY", "Renegades (JP)", "Party’s Over", "Tiny Pieces",
            "Wherever You Are", "Make It Out Alive", "Instrumental",
            "C.U.R.I.O.S.I.T.Y.", "Dystopia (JP)", "Delusion:All",
            "Stand Out Fit In (JP)", "Kimishidai Ressha", "Tropical Therapy",
            "The Pilot </3", "ENCORE: +Matter", "We Are (JP)",
            "ENCORE 2: Kanzen Kankaku Dreamer"
        ];

        function initSetlist() {
            const container = document.getElementById('setlist-content');
            setlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                if(track.includes("ENCORE")) div.classList.add('encore-label');
                div.innerText = track;
                container.appendChild(div);
                setTimeout(() => { div.classList.add('show'); }, 500 + (index * 400)); 
            });
        }

        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            document.getElementById("days").innerText = Math.floor(dist / 86400000);
            document.getElementById("hours").innerText = Math.floor((dist % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((dist % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((dist % 60000) / 1000);
        }, 1000);

        function updateWeight() {
            const w = document.getElementById("currentWeight").value;
            if(w) { localStorage.setItem("w78", w); document.getElementById("lastWeight").innerText = w + " KG"; }
        }

        window.onload = () => {
            const saved = localStorage.getItem("w78");
            if(saved) document.getElementById("lastWeight").innerText = saved + " KG";
            initSetlist();
        };
    </script>
</body>
</html>
