<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78 FIT - Premium Detox</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Syncopate:wght@400;700&family=Staatliches&family=Oswald:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            font-family: 'Oswald', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            cursor: pointer;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 50px;
            max-width: 1200px;
            width: 100%;
        }

        .container { width: 100%; max-width: 420px; position: relative; z-index: 10; }

        /* --- H1: PREMIUM 78 FIT (BUNGEE SHADE) --- */
        h1 {
            font-family: 'Bungee Shade', cursive;
            font-size: 5.5rem;
            color: #ffffff;
            text-align: center;
            margin: 0 0 10px 0;
            position: relative;
            /* Efek Kilat lewat */
            overflow: hidden;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        h1::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg);
            animation: shineThrough 5s infinite;
        }

        @keyframes shineThrough {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        /* --- SETLIST SIDEBAR (SYNCOPATE - ULTRA WIDE) --- */
        .setlist-sidebar {
            flex: 1;
            padding-top: 10px;
            min-width: 350px;
        }

        .setlist-title {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffffff;
            margin-bottom: 25px;
            letter-spacing: 8px;
            border-bottom: 3px solid #ffffff;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .song-item {
            font-family: 'Syncopate', sans-serif;
            font-weight: 400;
            font-size: 0.85rem;
            color: #cccccc;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.6s ease-out;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .song-item.show { opacity: 1; transform: translateX(0); }
        .song-item:hover { color: #fff; transform: scale(1.05); transition: 0.2s; }

        .encore-label { 
            color: #ff0000; 
            font-weight: 700; 
            margin-top: 20px; 
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        /* --- CARDS & UI --- */
        .card {
            backdrop-filter: blur(20px);
            background: rgba(0, 0, 0, 0.8);
            padding: 25px;
            border-radius: 4px; /* Sudut tajam lebih premium */
            margin-top: 25px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        h3 { font-family: 'Staatliches', sans-serif; font-size: 1.8rem; letter-spacing: 4px; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .timer-box { background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 15px 5px; }
        .timer-box span { font-family: 'Staatliches', sans-serif; font-size: 2rem; }

        button {
            font-family: 'Staatliches', sans-serif;
            width: 100%; padding: 15px; background: #fff; color: #000;
            border: none; font-size: 1.5rem; cursor: pointer; transition: 0.3s;
            letter-spacing: 3px; margin-top: 15px;
        }
        button:hover { background: #ff0000; color: #fff; }

        input[type="number"] {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid #333;
            color: #fff; font-size: 3rem; text-align: center; font-family: 'Staatliches', sans-serif;
        }

        .item { font-family: 'Oswald', sans-serif; font-weight: 300; display: flex; align-items: center; margin-bottom: 12px; font-size: 1.1rem; letter-spacing: 2px; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-right: 15px; accent-color: #ff0000; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .setlist-sidebar { min-width: 100%; border-top: 1px solid #222; padding-top: 40px; }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <audio id="themeSong" loop><source src="lagu1.mp3" type="audio/mpeg"></audio>

    <div class="main-wrapper">
        <div class="container">
            <h1>78 FIT</h1>
            
            <div class="card">
                <h3>STADIUM COUNTDOWN</h3>
                <div class="timer-grid">
                    <div class="timer-box"><span id="days">00</span><small>DAYS</small></div>
                    <div class="timer-box"><span id="hours">00</span><small>HRS</small></div>
                    <div class="timer-box"><span id="minutes">00</span><small>MIN</small></div>
                    <div class="timer-box"><span id="seconds">00</span><small>SEC</small></div>
                </div>
            </div>

            <div class="card">
                <h3>CURRENT WEIGHT</h3>
                <div id="lastWeight" style="font-size: 4rem; font-family: 'Staatliches', sans-serif;">--</div>
                <input type="number" id="currentWeight" step="0.1" placeholder="00.0">
                <button onclick="updateWeight()">LOG SESSION</button>
            </div>

            <div class="card checklist">
                <h3 style="text-align:center">DAILY PROTOCOL</h3>
                <div class="item"><input type="checkbox"> PUSH UP 50X</div>
                <div class="item"><input type="checkbox"> WEIGHT LIFTING</div>
                <div class="item"><input type="checkbox"> CARDIO BATTLE</div>
                <div class="item"><input type="checkbox"> NO SNACKS!</div>
            </div>
        </div>

        <div class="setlist-sidebar">
            <div class="setlist-title">DETOX ASIA TOUR 2026</div>
            <div id="setlist-content"></div>
        </div>
    </div>

    <script>
        const song = document.getElementById('themeSong');
        document.body.addEventListener('click', () => { if (song.paused) song.play(); }, { once: true });

        const setlist = [
            "Puppets Can’t Control You (JP)", "The Beginning", "Save Yourself (JP)",
            "NASTY", "Renegades (JP)", "Party’s Over", "Tiny Pieces",
            "Wherever You Are", "Make It Out Alive", "Instrumental",
            "C.U.R.I.O.S.I.T.Y.", "Dystopia (JP)", "Delusion:All",
            "Stand Out Fit In (JP)", "Kimishidai Ressha", "Tropical Therapy",
            "The Pilot </3", "ENCORE: +Matter", "We Are (JP)",
            "ENCORE 2: Kanzen Kankaku Dreamer"
        ];

        function initSetlist() {
            const container = document.getElementById('setlist-content');
            setlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                if(track.includes("ENCORE")) div.classList.add('encore-label');
                div.innerText = track;
                container.appendChild(div);
                setTimeout(() => { div.classList.add('show'); }, 500 + (index * 450)); 
            });
        }

        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            document.getElementById("days").innerText = Math.floor(dist / 86400000);
            document.getElementById("hours").innerText = Math.floor((dist % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((dist % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((dist % 60000) / 1000);
        }, 1000);

        function updateWeight() {
            const w = document.getElementById("currentWeight").value;
            if(w) { localStorage.setItem("w78", w); document.getElementById("lastWeight").innerText = w + " KG"; }
        }

        window.onload = () => {
            const saved = localStorage.getItem("w78");
            if(saved) document.getElementById("lastWeight").innerText = saved + " KG";
            initSetlist();
        };
    </script>
</body>
</html>
