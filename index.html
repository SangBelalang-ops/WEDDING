<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78 FIT - Road to OOR Jakarta</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rock+Salt&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.7);
            background-blend-mode: darken;
            font-family: 'Bebas Neue', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            cursor: pointer;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 500px; position: relative; z-index: 10; }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 4.5rem;
            color: #ff4757;
            text-shadow: 4px 4px 0px #000, 0 0 20px rgba(255, 71, 87, 0.8);
            margin: 10px 0;
            letter-spacing: 2px;
            transform: rotate(-3deg);
            text-align: center;
        }

        .quote {
            font-family: 'Rock Salt', cursive;
            font-size: 0.8rem;
            color: #bdc3c7;
            margin-bottom: 35px;
            text-align: center;
            line-height: 1.5;
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(20, 20, 20, 0.8);
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 25px;
            border: 2px solid #333;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            animation: borderGlow 5s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0% { border-color: #333; }
            50% { border-color: #ff4757; }
            100% { border-color: #333; }
        }

        h3 { font-size: 1.8rem; letter-spacing: 3px; color: #f1c40f; margin-top: 0; }
        
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .timer-box span { display: block; font-size: 28px; color: #ffffff; text-shadow: 2px 2px 5px #ff4757; }

        button {
            font-family: 'Bebas Neue', sans-serif;
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: #ff4757; color: white; font-size: 1.4rem; cursor: pointer; transition: 0.3s;
            letter-spacing: 2px; margin: 10px 0;
        }
        button:hover { background: #ffffff; color: #ff4757; transform: scale(1.05); }
        
        input[type="number"] {
            font-family: 'Bebas Neue', sans-serif;
            width: 80%; padding: 10px; margin: 10px 0; border-radius: 10px;
            background: rgba(0,0,0,0.5); color: #2ecc71; text-align: center; font-size: 2rem; border: 1px solid #333;
        }

        .checklist { text-align: left; }
        .item { font-size: 1.5rem; display: flex; align-items: center; margin-bottom: 10px; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 15px; accent-color: #ff4757; }

        /* SETLIST ANIMATION */
        .setlist-container {
            margin-top: 20px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #setlist-text {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            text-align: center;
        }

        .particle { position: fixed; background: #ff4757; width: 1px; height: 50px; opacity: 0.3; animation: fall linear infinite; z-index: 1; pointer-events: none; }
        @keyframes fall { 0% { transform: translateY(-100px) rotate(15deg); } 100% { transform: translateY(100vh) rotate(15deg); } }
    </style>
</head>
<body>

    <audio id="themeSong" loop><source src="lagu1.mp3" type="audio/mpeg"></audio>

    <div class="container">
        <h1>78 FIT</h1>
        <p class="quote">"If you don't keep moving, you'll eventually rot."</p>

        <div class="card">
            <h3>ROAD TO STADIUM</h3>
            <div class="timer-grid">
                <div class="timer-box"><span id="days">00</span><small>Days</small></div>
                <div class="timer-box"><span id="hours">00</span><small>Hours</small></div>
                <div class="timer-box"><span id="minutes">00</span><small>Min</small></div>
                <div class="timer-box"><span id="seconds">00</span><small>Sec</small></div>
            </div>
        </div>

        <div class="card">
            <h3>TARGET: 78.0 KG</h3>
            <div id="lastWeight" style="color:#2ecc71; font-size:3.5rem; margin-bottom: 5px;">--</div>
            <input type="number" id="currentWeight" step="0.1" placeholder="ENTER WEIGHT">
            <button onclick="updateWeight()">SAVE PROGRESS</button>
        </div>

        <div class="card checklist">
            <h3 style="text-align: center;">DAILY MISSION</h3>
            <div class="item"><input type="checkbox"> PUSH UP 50X</div>
            <div class="item"><input type="checkbox"> WEIGHT LIFTING</div>
            <div class="item"><input type="checkbox"> CARDIO BATTLE</div>
            <div class="item"><input type="checkbox"> NO SNACKS!</div>
        </div>

        <div class="setlist-container">
            <div id="setlist-text">DETOX TOUR 2026</div>
        </div>
    </div>

    <script>
        const song = document.getElementById('themeSong');
        document.body.addEventListener('click', () => { if (song.paused) song.play(); }, { once: true });

        // SETLIST DATA
        const setlist = [
            "1. Save Yourself",
            "2. Taking Off",
            "3. Wonder",
            "4. Let Me Let You Go",
            "5. Renegades",
            "6. Neon",
            "7. Vandalize",
            "8. Broken Heart of Gold",
            "9. Mighty Long Fall",
            "10. The Beginning",
            "11. Wasted Nights",
            "ENCORE: Stand Out Fit In"
        ];

        let setIndex = 0;
        const setElement = document.getElementById('setlist-text');

        function updateSetlist() {
            setElement.style.opacity = 0;
            setTimeout(() => {
                setElement.innerText = setlist[setIndex];
                setElement.style.opacity = 1;
                setIndex = (setIndex + 1) % setlist.length;
            }, 1500);
        }

        setInterval(updateSetlist, 4000);

        // TIMER LOGIC
        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            document.getElementById("days").innerText = Math.floor(dist / 86400000);
            document.getElementById("hours").innerText = Math.floor((dist % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((dist % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((dist % 60000) / 1000);
        }, 1000);

        function updateWeight() {
            const w = document.getElementById("currentWeight").value;
            if(w) { 
                localStorage.setItem("w78", w); 
                document.getElementById("lastWeight").innerText = w + " KG"; 
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem("w78");
            if(saved) document.getElementById("lastWeight").innerText = saved + " KG";
            updateSetlist();
            for (let i = 0; i < 15; i++) {
                let p = document.createElement('div'); p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 2 + 2) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(p);
            }
        };
    </script>
</body>
</html>
