<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78 FIT - Road to OOR Jakarta</title>
   <style>
    /* Tambahan biar tampilan "Hidup" */
    body {
        background: linear-gradient(-45deg, #000000, #1a1a1a, #4a0000, #121212);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .card {
        backdrop-filter: blur(10px);
        background: rgba(30, 30, 30, 0.8);
        border: 2px solid #ff4757;
        transition: 0.5s;
    }

    .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
    }
</style>
</head>
<body>

<div class="container">
    <h1>78 FIT</h1>
    <p><i>"Wherever you are, I'm always with you..."</i></p>

    <div class="card">
        <h3>COUNTDOWN TO ONE OK ROCK JKT</h3>
        <div class="timer-grid" id="countdown">
            <div class="timer-box"><span id="days">00</span><small>HARI</small></div>
            <div class="timer-box"><span id="hours">00</span><small>JAM</small></div>
            <div class="timer-box"><span id="minutes">00</span><small>MENIT</small></div>
            <div class="timer-box"><span id="seconds">00</span><small>DETIK</small></div>
        </div>
    </div>

    <div class="card">
        <h3>TARGET: 78.0 KG</h3>
        <p>Berat Terakhir: <span id="lastWeight" style="color:#2ecc71">--</span> kg</p>
        <input type="number" id="currentWeight" step="0.1" placeholder="Berat hari ini (kg)">
        <br>
        <button onclick="updateWeight()">UPDATE PROGRESS</button>
    </div>

    <div class="card checklist">
        <h3>DAILY WORKOUT</h3>
        <div class="checklist-item"><input type="checkbox"> Push Up 50x</div>
        <div class="checklist-item"><input type="checkbox"> Angkat Dumbbell</div>
        <div class="checklist-item"><input type="checkbox"> Cardio 15 Menit</div>
        <div class="checklist-item"><input type="checkbox"> Defisit Kalori (No Snack!)</div>
    </div>
</div>

<script>
    // LOGIKA COUNTDOWN
    const targetDate = new Date("May 16, 2026 19:00:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = d;
        document.getElementById("hours").innerHTML = h;
        document.getElementById("minutes").innerHTML = m;
        document.getElementById("seconds").innerHTML = s;

        if (distance < 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "CONCERT DAY! 🎸";
        }
    }, 1000);

    // LOGIKA SIMPAN BERAT BADAN
    function updateWeight() {
        const weight = document.getElementById("currentWeight").value;
        if (weight) {
            localStorage.setItem("userWeight", weight);
            document.getElementById("lastWeight").innerText = weight;
            alert("Mantap! Progress tersimpan, Bos!");
        }
    }

    // Load data lama pas refresh
    window.onload = function() {
        const savedWeight = localStorage.getItem("userWeight");
        if (savedWeight) {
            document.getElementById("lastWeight").innerText = savedWeight;
        }
    }
</script>

</body>
</html>
