<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Piter Andreas Sinaga & Pasangan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root { --gold: #b8860b; --dark: #2c3e50; --pink: #ffb6c1; --glass: rgba(255, 255, 255, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            color: var(--dark); 
            overflow-x: hidden; 
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://i.postimg.cc/mcDgQ8jv/utma.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%23b8860b" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'), auto;
        }

        /* EFEK SAKURA - DIPERKUAT */
        .sakura { 
            position: fixed; 
            top: -10%; 
            background-color: var(--pink); 
            border-radius: 100% 0 100% 0; 
            opacity: 0.8; 
            pointer-events: none; 
            z-index: 9999; 
            animation: fall linear infinite; 
        }
        @keyframes fall { 
            0% { transform: translateY(-10vh) rotate(0deg); } 
            100% { transform: translateY(110vh) rotate(360deg); } 
        }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--glass); padding: 10px 20px; border-radius: 30px; display: flex; gap: 15px; z-index: 1000; border: 1px solid var(--gold); backdrop-filter: blur(5px); }
        nav a { text-decoration: none; color: var(--dark); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }

        section { padding: 80px 20px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        
        .hero { color: white; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 4.5rem; color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        #gallery { background: var(--glass); backdrop-filter: blur(8px); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; max-width: 1100px; margin: 0 auto; }
        .gallery-item img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #wish { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(5px); }
        form { max-width: 500px; margin: 0 auto 30px; background: white; padding: 25px; border-radius: 15px; text-align: left; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        button { width: 100%; background: var(--gold); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .wish-container { max-width: 500px; margin: 0 auto; max-height: 400px; overflow-y: auto; text-align: left; }
        .wish-card { background: white; padding: 15px; border-radius: 10px; border-left: 5px solid var(--gold); margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .bank-card { background: white; padding: 30px; border-radius: 20px; border: 2px dashed var(--gold); max-width: 400px; margin: 20px auto; color: var(--dark); }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#wish">Ucapan</a>
        <a href="#gift">Kado</a>
    </nav>

    <section id="home" class="hero">
        <p class="animate__animated animate__fadeInDown">THE WEDDING OF</p>
        <h1 class="animate__animated animate__zoomIn">Piter Andreas Sinaga<br>& Pasangan</h1>
        <p class="animate__animated animate__fadeInUp">( MASIH DICARI )</p>
        <div style="font-size: 2rem; margin-top: 20px; font-weight: 600;" class="animate__animated animate__fadeInUp">16 April 2026</div>
    </section>

    <section id="gallery">
        <h2 style="font-family: 'Dancing Script', cursive; font-size: 3rem; margin-bottom: 30px; color: var(--gold);">Our Gallery</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://i.postimg.cc/y3WmtmVc/1.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/xcJGP3x4/2.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/v45WJHd4/3.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/PpVZWCmj/4.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/nXfmGbQc/5.jpg"></div>
        </div>
    </section>

    <section id="wish">
        <h2 style="font-family: 'Dancing Script', cursive; font-size: 3rem; margin-bottom: 30px; color: var(--gold);">Doa & Ucapan</h2>
        <form id="guestbook">
            <input type="text" id="nama" placeholder="Nama Anda" required>
            <textarea id="pesan" placeholder="Tulis ucapan..." rows="3" required></textarea>
            <button type="submit" id="btnKirim">Kirim Ucapan</button>
        </form>
        <div id="display-wish" class="wish-container"></div>
    </section>

    <section id="gift" style="background: var(--glass);">
        <h2 style="font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--gold);">Digital Gift</h2>
        <div class="bank-card">
            <p><strong>BCA</strong></p>
            <p id="rekening" style="font-size: 1.8rem; font-weight: 600; margin: 10px 0; color: var(--gold);">3491684397</p>
            <p>a.n Piter Andreas Sinaga</p>
            <button onclick="copyRek()" style="margin-top: 15px; padding: 10px; font-size: 0.8rem;">Salin Nomor Rekening</button>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtmSRH_Y1NtGaN1VNLb-1jfQaMum5lOPk",
            authDomain: "wedding-f13d8.firebaseapp.com",
            projectId: "wedding-f13d8",
            storageBucket: "wedding-f13d8.firebasestorage.app",
            messagingSenderId: "933008597878",
            appId: "1:933008597878:web:77d64d919b3bad44ded057",
            databaseURL: "https://wedding-f13d8-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // KIRIM WISH
        document.getElementById('guestbook').addEventListener('submit', function(e) {
            e.preventDefault();
            const n = document.getElementById('nama').value;
            const p = document.getElementById('pesan').value;
            db.ref('wishes').push({ nama: n, pesan: p }).then(() => {
                document.getElementById('guestbook').reset();
                alert("Ucapan terkirim!");
            });
        });

        // TAMPILKAN WISH
        db.ref('wishes').on('value', (snap) => {
            const data = snap.val();
            const div = document.getElementById('display-wish');
            div.innerHTML = '';
            if(data) {
                Object.values(data).reverse().forEach(item => {
                    div.innerHTML += `<div class="wish-card"><strong>${item.nama}</strong><p>${item.pesan}</p></div>`;
                });
            }
        });

        // SALIN REKENING
        function copyRek() {
            navigator.clipboard.writeText("3491684397");
            alert("Nomor Rekening Berhasil Disalin!");
        }

        // ANIMASI SAKURA - DIPERBANYAK
        function createSakura() {
            const s = document.createElement('div');
            s.className = 'sakura';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.width = Math.random() * 10 + 10 + 'px';
            s.style.height = s.style.width;
            s.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 6000);
        }
        setInterval(createSakura, 200);
    </script>
</body>
</html>
