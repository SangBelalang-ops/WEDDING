<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilas TO ONE OK ROCK - Jakarta 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Oswald:wght@500;700&family=Chakra+Petch:wght@700&family=Staatliches&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* GIF One OK Rock Full Color */
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            background-blend-mode: normal;
            /* Font dasar diganti jadi tajam/modern */
            font-family: 'Oswald', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            cursor: pointer;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
        }

        .container { width: 100%; max-width: 450px; position: relative; z-index: 10; }

        /* --- H1: PREMIUM GOTHIC INDUSTRIAL --- */
        h1 {
            font-family: 'UnifrakturMaguntia', serif;
            font-size: 3.5rem;
            color: #ffffff;
            text-align: center;
            margin: 0;
            position: relative;
            /* Efek Kilat lewat */
            overflow: hidden;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            transition: all 0.3s ease-out;
            border-bottom: 2px solid #ffffff;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        /* Pseudo-element buat cahaya tajam lewat */
        h1::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg);
            animation: shineThrough 4s infinite;
        }

        /* Hover Effect: Putih Mati -> Merah Kila */
        h1:hover {
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            border-bottom-color: #ff0000;
        }

        @keyframes shineThrough {
            0% { left: -150%; }
            25% { left: 150%; }
            100% { left: 150%; }
        }

        /* --- SETLIST SIDEBAR (BLACK & WHITE) --- */
        .setlist-sidebar {
            flex: 1;
            padding-top: 10px;
            text-align: left;
            min-width: 300px;
        }

        .setlist-title {
            font-family: 'Staatliches', sans-serif;
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255,255,255,0.7);
            border-bottom: 2px solid #ffffff;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .song-list-scroll {
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 10px;
        }
        /* Custom Scrollbar */
        .song-list-scroll::-webkit-scrollbar { width: 5px; }
        .song-list-scroll::-webkit-scrollbar-thumb { background: #ffffff; border-radius: 10px; }

        .song-item {
            font-family: 'Oswald', sans-serif; 
            font-weight: 500;
            font-size: 1rem;
            color: #bbbbbb;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.5s ease-out;
            line-height: 1.3;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .song-item.show { opacity: 1; transform: translateX(0); }
        .encore-label { color: #ff0000; font-size: 1.2rem; margin-top: 15px; font-family: 'Staatliches', sans-serif; letter-spacing: 2px;}

        /* --- CARD STYLE (Black Minimalist) --- */
        .card {
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.85); 
            padding: 20px;
            border-radius: 10px;
            margin-top: 25px;
            border: 1px solid #333;
            border-top: 3px solid #ff0000; /* Aksen merah atas */
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            transition: 0.3s;
        }

        .card:hover { border-color: #ffffff; }

        h3 { 
            font-family: 'Staatliches', sans-serif;
            font-size: 1.6rem; 
            color: #ffffff; 
            margin-top: 0; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px rgba(255,255,255,0.7);
        }

        /* --- TIMER CLEAN VERSION (TWO-TONE) --- */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .timer-box { text-align: center; }
        
        .timer-box span { 
            font-family: 'Chakra Petch', sans-serif; /* Font digital industrial */
            font-size: 2.5rem; 
            display: block;
            color: #ff0000; /* Angka warna merah */
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
            line-height: 1;
        }
        
        .timer-box small { 
            font-family: 'Oswald', sans-serif;
            font-size: 0.7rem; 
            color: #ffffff; /* Label warna putih */
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* --- BUTTONS & INPUT --- */
        button {
            font-family: 'Staatliches', sans-serif;
            width: 100%; padding: 12px; border-radius: 5px; border: none;
            background: #ff0000; /* Red OOR Button */
            color: white; font-size: 1.5rem; cursor: pointer; transition: 0.2s;
            letter-spacing: 2px;
        }
        button:hover { background: #ffffff; color: #000000; box-shadow: 0 5px 25px rgba(255,255,255,0.5); }
        
        input[type="number"] {
            font-family: 'Chakra Petch', sans-serif;
            width: 80%; padding: 8px; margin: 10px 0; border-radius: 5px;
            background: rgba(0,0,0,0.7); color: #ffffff; text-align: center; font-size: 2.2rem; border: 1px solid #333;
        }
        input[type="number"]:focus { border-color: #ffffff; outline: none; }

        /* --- CHECKLIST --- */
        .checklist { text-align: left; }
        .item { font-family: 'Oswald', sans-serif; font-weight: 500; display: flex; align-items: center; margin-bottom: 8px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-right: 15px; accent-color: #ff0000; }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .setlist-sidebar { padding-top: 40px; text-align: center; width: 100%; }
            .song-list-scroll { max-height: none; overflow: visible; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <audio id="themeSong" loop><source src="lagu1.mp3" type="audio/mpeg"></audio>

    <div class="main-wrapper">
        <div class="container">
            <h1>Lilas TO ONE OK ROCK</h1>
            
            <div class="card">
                <h3>DETOX TOUR JAKARTA</h3>
                <div class="timer-grid">
                    <div class="timer-box"><span id="days">00</span><small>Days</small></div>
                    <div class="timer-box"><span id="hours">00</span><small>Hours</small></div>
                    <div class="timer-box"><span id="minutes">00</span><small>Min</small></div>
                    <div class="timer-box"><span id="seconds">00</span><small>Sec</small></div>
                </div>
            </div>

            <div class="card checklist">
                <h3 style="text-align: center;">DAILY PROTOCOL</h3>
                <div class="item"><input type="checkbox"> PUSH UP 50X</div>
                <div class="item"><input type="checkbox"> WEIGHT LIFTING</div>
                <div class="item"><input type="checkbox"> CARDIO BATTLE</div>
                <div class="item"><input type="checkbox"> NO SNACKS!</div>
            </div>
        </div>

        <div class="setlist-sidebar">
            <div class="setlist-title">DETOX TOUR ASIA 2026 SETLIST:</div>
            <div class="song-list-scroll" id="setlist-content"></div>
        </div>
    </div>

    <script>
        const song = document.getElementById('themeSong');
        document.body.addEventListener('click', () => { if (song.paused) song.play(); }, { once: true });

        // TRUE SETLIST
        const setlist = [
            "Puppets Can’t Control You (JP)", "The Beginning", "Save Yourself (JP)",
            "NASTY", "Renegades (JP)", "Party’s Over", "Tiny Pieces",
            "Wherever You Are", "Make It Out Alive", "Instrumental Solo",
            "C.U.R.I.O.S.I.T.Y.", "Dystopia (JP)", "Delusion:All",
            "Stand Out Fit In (JP)", "Kimishidai Ressha", "Tropical Therapy",
            "The Pilot </3", 
            "--- ENCORE ---",
            "ENCORE: +Matter", "ENCORE: We Are (JP)",
            "--- ENCORE 2 ---",
            "ENCORE 2: Kanzen Kankaku Dreamer"
        ];

        function initSetlist() {
            const container = document.getElementById('setlist-content');
            setlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                if(track.includes("ENCORE")) div.classList.add('encore-label');
                div.innerText = "> " + track; // Pake '>' ala CLI/industrial
                container.appendChild(div);
                setTimeout(() => { div.classList.add('show'); }, 500 + (index * 600)); 
            });
        }

        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            document.getElementById("days").innerText = Math.floor(dist / 86400000);
            document.getElementById("hours").innerText = Math.floor((dist % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((dist % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((dist % 60000) / 1000);
        }, 1000);

        window.onload = () => {
            initSetlist();
        };
    </script>
</body>
</html>
