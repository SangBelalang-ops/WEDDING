<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78 FIT - Black Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Special+Elite&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            background-blend-mode: luminosity; /* Bikin background jadi hitam putih */
            font-family: 'Oswald', sans-serif;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            cursor: crosshair;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 50px;
            max-width: 1100px;
            width: 100%;
        }

        .container { width: 100%; max-width: 420px; position: relative; z-index: 10; }

        /* --- H1: GOTHIC WHITE SHINE --- */
        h1 {
            font-family: 'UnifrakturMaguntia', serif;
            font-size: 6rem;
            color: #fff;
            text-align: center;
            margin: 0;
            position: relative;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            overflow: hidden;
        }

        h1::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shine 5s infinite;
        }

        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        /* --- SETLIST: TYPEWRITER STYLE --- */
        .setlist-sidebar {
            flex: 1;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 320px;
        }

        .setlist-title {
            font-family: 'UnifrakturMaguntia', serif;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 20px;
            border-bottom: 1px double #fff;
            padding-bottom: 10px;
        }

        .song-item {
            font-family: 'Special Elite', cursive;
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.5s;
        }

        .song-item.show { opacity: 1; transform: translateY(0); }
        .song-item:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        /* --- CARDS: MINIMALIST --- */
        .card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            padding: 25px;
            margin-top: 25px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover { border-color: #fff; }

        h3 { 
            font-family: 'Oswald', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* --- TIMER --- */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .timer-box { border-bottom: 1px solid #444; padding: 10px 0; }
        .timer-box span { font-size: 1.8rem; font-weight: bold; }
        .timer-box small { font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px; }

        /* --- BUTTONS & INPUT --- */
        button {
            font-family: 'Oswald', sans-serif;
            width: 100%; padding: 15px; background: #fff; color: #000;
            border: none; cursor: pointer; font-weight: bold; letter-spacing: 3px;
            margin-top: 15px; transition: 0.3s;
        }
        button:hover { background: #888; color: #fff; }
        
        input[type="number"] {
            width: 90%; background: transparent; border: none; border-bottom: 1px solid #444;
            color: #fff; font-size: 2.5rem; text-align: center; font-family: 'Oswald', sans-serif;
            margin: 10px 0;
        }
        input[type="number"]:focus { outline: none; border-bottom-color: #fff; }

        .checklist { text-align: left; }
        .item { display: flex; align-items: center; margin-bottom: 12px; font-size: 1.1rem; letter-spacing: 1px; }
        input[type="checkbox"] { filter: grayscale(1); margin-right: 15px; width: 18px; height: 18px; }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .setlist-sidebar { border-left: none; border-top: 1px solid #444; width: 100%; }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <audio id="themeSong" loop><source src="lagu1.mp3" type="audio/mpeg"></audio>

    <div class="main-wrapper">
        <div class="container">
            <h1>78 FIT</h1>
            
            <div class="card">
                <h3>TIME TO STADIUM</h3>
                <div class="timer-grid">
                    <div class="timer-box"><span id="days">00</span><small>DAYS</small></div>
                    <div class="timer-box"><span id="hours">00</span><small>HOURS</small></div>
                    <div class="timer-box"><span id="minutes">00</span><small>MINS</small></div>
                    <div class="timer-box"><span id="seconds">00</span><small>SECS</small></div>
                </div>
            </div>

            <div class="card">
                <h3>TARGET: 78.0 KG</h3>
                <div id="lastWeight" style="font-size: 3.5rem; letter-spacing: -2px;">--</div>
                <input type="number" id="currentWeight" step="0.1" placeholder="00.0">
                <button onclick="updateWeight()">UPDATE BATTLE</button>
            </div>

            <div class="card checklist">
                <h3>DAILY DRILL</h3>
                <div class="item"><input type="checkbox"> PUSH UP 50X</div>
                <div class="item"><input type="checkbox"> WEIGHT LIFTING</div>
                <div class="item"><input type="checkbox"> CARDIO BATTLE</div>
                <div class="item"><input type="checkbox"> NO SNACKS!</div>
            </div>
        </div>

        <div class="setlist-sidebar">
            <div class="setlist-title">DETOX TOUR ASIA 2026</div>
            <div id="setlist-content"></div>
        </div>
    </div>

    <script>
        const song = document.getElementById('themeSong');
        document.body.addEventListener('click', () => { if (song.paused) song.play(); }, { once: true });

        const setlist = [
            "Puppets Can’t Control You (JP)", "The Beginning", "Save Yourself (JP)",
            "NASTY", "Renegades (JP)", "Party’s Over", "Tiny Pieces",
            "Wherever You Are", "Make It Out Alive", "Instrumental",
            "C.U.R.I.O.S.I.T.Y.", "Dystopia (JP)", "Delusion:All",
            "Stand Out Fit In (JP)", "Kimishidai Ressha", "Tropical Therapy",
            "The Pilot </3", "ENCORE: +Matter", "We Are (JP)",
            "ENCORE 2: Kanzen Kankaku Dreamer"
        ];

        function initSetlist() {
            const container = document.getElementById('setlist-content');
            setlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerText = "> " + track;
                container.appendChild(div);
                setTimeout(() => { div.classList.add('show'); }, 100 + (index * 400)); 
            });
        }

        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            document.getElementById("days").innerText = Math.floor(dist / 86400000);
            document.getElementById("hours").innerText = Math.floor((dist % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((dist % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((dist % 60000) / 1000);
        }, 1000);

        function updateWeight() {
            const w = document.getElementById("currentWeight").value;
            if(w) { localStorage.setItem("w78", w); document.getElementById("lastWeight").innerText = w + " KG"; }
        }

        window.onload = () => {
            const saved = localStorage.getItem("w78");
            if(saved) document.getElementById("lastWeight").innerText = saved + " KG";
            initSetlist();
        };
    </script>
</body>
</html>
