<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78 FIT - Road to OOR Jakarta</title>
    <style>
        body {
            /* BACKGROUND GIF ONE OK ROCK */
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.7);
            background-blend-mode: darken;

            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 3rem;
            color: #ff4757;
            text-shadow: 2px 2px 10px rgba(255, 71, 87, 0.8);
            margin-bottom: 5px;
            letter-spacing: 8px;
        }

        .quote {
            font-style: italic;
            color: #bdc3c7;
            margin-bottom: 30px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: rgba(25, 25, 25, 0.85); /* Transparan Gelap */
            backdrop-filter: blur(8px); /* Efek Blur Kaca */
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 71, 87, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: 0.3s;
        }

        .card:hover {
            border-color: #ff4757;
            transform: scale(1.02);
        }

        /* TIMER STYLE */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .timer-box {
            background: rgba(255, 71, 87, 0.2);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ff4757;
        }

        .timer-box span {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: #f1c40f;
        }

        .timer-box small {
            font-size: 10px;
            text-transform: uppercase;
        }

        /* INPUT & BUTTON */
        input[type="number"] {
            width: 80%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: none;
            background: #333;
            color: white;
            font-size: 1.1rem;
            text-align: center;
        }

        button {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #ff4757;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        button:hover {
            background: #ff6b81;
        }

        /* CHECKLIST */
        .checklist {
            text-align: left;
        }

        .item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            accent-color: #ff4757;
        }

        .status-weight {
            font-size: 1.2rem;
            color: #2ecc71;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>78 FIT</h1>
        <p class="quote">"If you don't keep moving, you'll eventually rot."</p>

        <div class="card">
            <h3 style="margin-top: 0;">ROAD TO ONE OK ROCK JKT</h3>
            <div class="timer-grid">
                <div class="timer-box"><span id="days">00</span><small>Hari</small></div>
                <div class="timer-box"><span id="hours">00</span><small>Jam</small></div>
                <div class="timer-box"><span id="minutes">00</span><small>Menit</small></div>
                <div class="timer-box"><span id="seconds">00</span><small>Detik</small></div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top: 0;">TARGET: 78.0 KG</h3>
            <p>Berat Terakhir: <span id="lastWeight" class="status-weight">--</span> kg</p>
            <input type="number" id="currentWeight" step="0.1" placeholder="Input Berat Hari Ini">
            <button onclick="updateWeight()">SIMPAN PROGRESS</button>
        </div>

        <div class="card checklist">
            <h3 style="margin-top: 0; text-align: center;">DAILY BATTLE</h3>
            <div class="item"><input type="checkbox"> Push Up 50x</div>
            <div class="item"><input type="checkbox"> Angkat Dumbbell</div>
            <div class="item"><input type="checkbox"> Cardio 15 Menit</div>
            <div class="item"><input type="checkbox"> No Snacks Today!</div>
        </div>
    </div>

    <script>
        // COUNTDOWN LOGIC
        const targetDate = new Date("May 16, 2026 19:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }, 1000);

        // STORAGE LOGIC
        function updateWeight() {
            const w = document.getElementById("currentWeight").value;
            if(w) {
                localStorage.setItem("weight78", w);
                document.getElementById("lastWeight").innerText = w;
                alert("Gas terus! Progress tersimpan!");
            }
        }

        window.onload = function() {
            const saved = localStorage.getItem("weight78");
            if(saved) document.getElementById("lastWeight").innerText = saved;
        }
    </script>

</body>
</html>
