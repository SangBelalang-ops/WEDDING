<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Piter & ???</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --gold: #b8860b; --dark: #2c3e50; --cream: #fffaf0; --pink: #ffb6c1; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--cream); color: var(--dark); overflow-x: hidden; cursor: crosshair; }
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); padding: 10px 20px; border-radius: 30px; display: flex; gap: 20px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid var(--gold); }
        nav a { text-decoration: none; color: var(--dark); font-size: 0.85rem; font-weight: 600; }
        section { padding: 100px 20px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1500&q=80') center/cover; color: white; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 5rem; color: var(--gold); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto; }
        .gallery-grid img { width: 100%; border-radius: 12px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        form { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; background: white; padding: 30px; border-radius: 15px; }
        input, textarea { padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Poppins', sans-serif; }
        button { background: var(--gold); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .bank-card { background: white; padding: 30px; border-radius: 15px; max-width: 450px; margin: 30px auto; border: 2px dashed var(--pink); }
        .btn-copy { font-size: 0.8rem; background: #fdf2f2; color: #e74c3c; padding: 8px 15px; border-radius: 20px; cursor: pointer; display: inline-block; margin-top: 10px; font-weight: 600; }
        .sakura { position: absolute; background-color: var(--pink); border-radius: 100% 0 100% 0; opacity: 0.6; animation: fall 10s infinite linear; pointer-events: none; z-index: 100; }
        @keyframes fall { 0% { transform: translate(0, -10px) rotate(0deg); opacity: 0.8; } 100% { transform: translate(100px, 100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <nav><a href="#home">Home</a><a href="#gallery">Gallery</a><a href="#wish">Wish</a><a href="#gift">Gift</a></nav>

    <section id="home" class="hero">
        <p>THE WEDDING OF</p>
        <h1 class="animate__animated animate__zoomIn">Piter & ???</h1>
        <div style="font-size: 1.5rem; margin-top: 20px;">16 Mei 2026</div>
    </section>

    <section id="gallery">
        <h2>Pre-Wedding Gallery</h2>
        <div class="gallery-grid">
            <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=600" alt="Prewed 1">
            <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=600" alt="Prewed 2">
        </div>
    </section>

    <section id="wish" style="background: white;">
        <h2>Kirim Ucapan & Doa</h2>
        <form id="guestbook">
            <input type="text" placeholder="Nama Anda" required>
            <textarea placeholder="Tulis doa dan ucapan..." rows="4" required></textarea>
            <button type="submit">Kirim Ucapan</button>
        </form>
        <div id="display-wish" style="margin-top: 40px;"></div>
    </section>

    <section id="gift">
        <h2>Digital Gift</h2>
        <div class="bank-card">
            <p><strong>BANK CENTRAL ASIA (BCA)</strong></p>
            <p id="rekening">1234567890</p>
            <p>a.n Piter Andreas Sinaga</p>
            <span class="btn-copy" onclick="copyRek()">Salin No. Rekening</span>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtmSRH_Y1NtGaN1VNLb-1jfQaMum5lOPk",
            authDomain: "wedding-f13d8.firebaseapp.com",
            projectId: "wedding-f13d8",
            storageBucket: "wedding-f13d8.firebasestorage.app",
            messagingSenderId: "933008597878",
            appId: "1:933008597878:web:77d64d919b3bad44ded057",
            measurementId: "G-RYTS4YDPEH",
            databaseURL: "https://wedding-f13d8-default-rtdb.firebaseio.com/" 
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Kirim Ucapan
        document.getElementById('guestbook').addEventListener('submit', function(e) {
            e.preventDefault();
            const nama = this.querySelectorAll('input')[0].value;
            const pesan = this.querySelector('textarea').value;
            database.ref('wishes').push({ nama, pesan, timestamp: Date.now() });
            this.reset();
            alert("Ucapan Terkirim!");
        });

        // Ambil Ucapan Real-time
        database.ref('wishes').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('display-wish');
            container.innerHTML = '<h3>Ucapan Tamu:</h3>';
            if (data) {
                Object.values(data).reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.style.cssText = "background:#f9f9f9; margin:10px auto; padding:15px; border-radius:10px; border-left:5px solid #b8860b; text-align:left; max-width:500px;";
                    div.innerHTML = `<strong>${item.nama}</strong><br><small>${item.pesan}</small>`;
                    container.appendChild(div);
                });
            }
        });

        function copyRek() {
            const rek = document.getElementById('rekening').innerText;
            navigator.clipboard.writeText(rek);
            alert("Rekening disalin!");
        }

        // Efek Sakura
        function createSakura() {
            const sakura = document.createElement('div');
            sakura.classList.add('sakura');
            sakura.style.left = Math.random() * 100 + 'vw';
            sakura.style.animationDuration = Math.random() * 5 + 5 + 's';
            sakura.style.width = Math.random() * 10 + 10 + 'px';
            sakura.style.height = sakura.style.width;
            document.body.appendChild(sakura);
            setTimeout(() => { sakura.remove(); }, 10000);
        }
        setInterval(createSakura, 300);
    </script>
</body>
</html>
