<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilas To ONE OK ROCK - Dynamic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Staatliches&family=Oswald:wght@500;700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            font-family: 'Oswald', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            cursor: pointer;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
        }

        .container { width: 100%; max-width: 420px; position: relative; z-index: 10; }

        /* --- H1: TWO-TONE 78 FIT --- */
        h1 {
            font-family: 'Staatliches', sans-serif;
            font-size: 6.5rem;
            text-align: center;
            margin: 0;
            letter-spacing: 2px;
            line-height: 1;
        }

        .num-78 {
            color: #ffffff;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            overflow: hidden;
        }

        /* Animasi cahaya cuma di angka 78 */
        .num-78::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
            transform: skewX(-25deg);
            animation: shineThrough 4s infinite;
        }

        .text-fit {
            color: #ff0000; /* Merah OOR */
            text-shadow: 2px 2px 0px #000;
        }

        @keyframes shineThrough {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        /* --- SETLIST SIDEBAR --- */
        .setlist-sidebar {
            flex: 1;
            padding-top: 15px;
            min-width: 300px;
        }

        .setlist-title {
            font-family: 'Staatliches', sans-serif;
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 20px;
            border-left: 5px solid #ff0000;
            padding-left: 15px;
            letter-spacing: 2px;
        }

        .song-item {
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            font-size: 1.1rem;
            color: #bbbbbb;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateX(20px);
            transition: 0.5s;
            text-transform: uppercase;
        }

        .song-item.show { opacity: 1; transform: translateX(0); }
        .song-item:hover { color: #ffffff; padding-left: 5px; }
        .encore-label { color: #ff0000; border-top: 1px solid #333; padding-top: 10px; margin-top: 15px; font-weight: 700; }

        /* --- CARDS --- */
        .card {
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            margin-top: 25px;
            border: 1px solid #222;
            border-top: 3px solid #ff0000; /* Aksen merah atas */
        }

        h3 { font-family: 'Staatliches', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 15px; }

        /* --- COUNTDOWN: FONT & WARNA BEDA --- */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .timer-box { text-align: center; }
        
        .timer-box span { 
            font-family: 'Chakra Petch', sans-serif; /* Font digital industrial */
            font-size: 2.5rem; 
            display: block;
            color: #ff0000; /* Angka warna merah */
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
            line-height: 1;
        }
        
        .timer-box small { 
            font-family: 'Oswald', sans-serif;
            font-size: 0.7rem; 
            color: #ffffff; /* Label warna putih */
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* --- BUTTONS & INPUT --- */
        button {
            font-family: 'Staatliches', sans-serif;
            width: 100%; padding: 12px; background: #ff0000; color: #fff;
            border: none; font-size: 1.5rem; cursor: pointer; transition: 0.2s;
            letter-spacing: 2px;
        }
        button:hover { background: #ffffff; color: #000; }

        input[type="number"] {
            width: 80%; background: transparent; border: none; border-bottom: 2px solid #ff0000;
            color: #ffffff; font-size: 2.8rem; text-align: center; font-family: 'Chakra Petch', sans-serif;
            margin-bottom: 10px;
        }
        input[type="number"]:focus { outline: none; border-bottom-color: #fff; }

        .item { display: flex; align-items: center; margin-bottom: 10px; font-size: 1.1rem; text-transform: uppercase; font-weight: 500; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-right: 15px; accent-color: #ff0000; }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .setlist-sidebar { width: 100%; border-top: 1px solid #333; padding-top: 30px; }
            h1 { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

    <audio id="themeSong" loop><source src="lagu1.mp3" type="audio/mpeg"></audio>

    <div class="main-wrapper">
        <div class="container">
            <h1><span class="num-78">78</span><span class="text-fit">FIT</span></h1>
            
            <div class="card">
                <h3>DETOX TOUR COUNTDOWN</h3>
                <div class="timer-grid">
                    <div class="timer-box"><span id="days">00</span><small>DAYS</small></div>
                    <div class="timer-box"><span id="hours">00</span><small>HOURS</small></div>
                    <div class="timer-box"><span id="minutes">00</span><small>MINS</small></div>
                    <div class="timer-box"><span id="seconds">00</span><small>SECS</small></div>
                </div>
            </div>

            <div class="card">
                <h3>TARGET: 78.0 KG</h3>
                <div id="lastWeight" style="font-size: 4rem; font-family: 'Chakra Petch', sans-serif; color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.3);">--</div>
                <input type="number" id="currentWeight" step="0.1" placeholder="00.0">
                <button onclick="updateWeight()">SAVE BATTLE PROGRESS</button>
            </div>

            <div class="card checklist">
                <h3 style="text-align: center;">DAILY MISSIONS</h3>
                <div class="item"><input type="checkbox"> PUSH UP 50X</div>
                <div class="item"><input type="checkbox"> WEIGHT LIFTING</div>
                <div class="item"><input type="checkbox"> CARDIO BATTLE</div>
                <div class="item"><input type="checkbox"> NO SNACKS!</div>
            </div>
        </div>

        <div class="setlist-sidebar">
            <div class="setlist-title">DETOX ASIA TOUR 2026 SETLIST</div>
            <div id="setlist-content"></div>
        </div>
    </div>

    <script>
        const song = document.getElementById('themeSong');
        document.body.addEventListener('click', () => { if (song.paused) song.play(); }, { once: true });

        const setlist = [
            "Puppets Can’t Control You (JP)", "The Beginning", "Save Yourself (JP)",
            "NASTY", "Renegades (JP)", "Party’s Over", "Tiny Pieces",
            "Wherever You Are", "Make It Out Alive", "Instrumental",
            "C.U.R.I.O.S.I.T.Y.", "Dystopia (JP)", "Delusion:All",
            "Stand Out Fit In (JP)", "Kimishidai Ressha", "Tropical Therapy",
            "The Pilot </3", "ENCORE: +Matter", "We Are (JP)",
            "ENCORE 2: Kanzen Kankaku Dreamer"
        ];

        function initSetlist() {
            const container = document.getElementById('setlist-content');
            setlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                if(track.includes("ENCORE")) div.classList.add('encore-label');
                div.innerText = track;
                container.appendChild(div);
                setTimeout(() => { div.classList.add('show'); }, 500 + (index * 400)); 
            });
        }

        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            document.getElementById("days").innerText = Math.floor(dist / 86400000);
            document.getElementById("hours").innerText = Math.floor((dist % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((dist % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((dist % 60000) / 1000);
        }, 1000);

        function updateWeight() {
            const w = document.getElementById("currentWeight").value;
            if(w) { localStorage.setItem("w78", w); document.getElementById("lastWeight").innerText = w + " KG"; }
        }

        window.onload = () => {
            const saved = localStorage.getItem("w78");
            if(saved) document.getElementById("lastWeight").innerText = saved + " KG";
            initSetlist();
        };
    </script>
</body>
</html>
