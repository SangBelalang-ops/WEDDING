<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilas TO OOR 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            font-family: 'Oswald', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            cursor: crosshair;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
        }

        .container { width: 100%; max-width: 450px; position: relative; z-index: 10; }

        /* --- H1: SOLID & BOLD (ANTON) --- */
        h1 {
            font-family: 'Anton', sans-serif;
            font-size: 4.5rem;
            text-align: center;
            margin: 0 0 20px 0;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .lilas {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        .oor {
            color: #ff0000;
            display: block;
            font-size: 3.2rem;
            margin-top: -10px;
        }

        /* Efek Kilatan Tipis (Biar Mewah, Gak Alay) */
        h1::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-20deg);
            animation: shineThrough 6s infinite ease-in-out;
        }

        @keyframes shineThrough {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        /* --- SETLIST SIDEBAR --- */
        .setlist-sidebar {
            flex: 1;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            border-left: 2px solid #ff0000;
            min-width: 300px;
        }

        .setlist-title {
            font-family: 'Anton', sans-serif;
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .song-item {
            font-family: 'Oswald', sans-serif; 
            font-weight: 500;
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateX(20px);
            transition: 0.4s;
            text-transform: uppercase;
        }

        .song-item.show { opacity: 1; transform: translateX(0); }
        .song-item:hover { color: #ffffff; border-left: 3px solid #ff0000; padding-left: 10px; }
        
        .encore-label { color: #ff0000; font-weight: 700; margin-top: 15px; }

        /* --- CARD STYLE: INDUSTRIAL --- */
        .card {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #222;
            text-align: center;
        }

        h3 { 
            font-family: 'Anton', sans-serif;
            font-size: 1.3rem; 
            letter-spacing: 2px;
            color: #555;
            margin-bottom: 15px;
        }

        /* --- COUNTDOWN: DYNAMIC COLOR --- */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .timer-box span { 
            font-family: 'Chakra Petch', sans-serif;
            font-size: 2.8rem; 
            display: block;
            color: #ff0000;
            line-height: 1;
        }
        .timer-box small { font-size: 0.7rem; opacity: 0.5; }

        /* --- BUTTONS --- */
        button {
            font-family: 'Anton', sans-serif;
            width: 100%; padding: 15px; background: #ff0000; color: #fff;
            border: none; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
            letter-spacing: 2px;
        }
        button:hover { background: #ffffff; color: #000; }

        .item { display: flex; align-items: center; margin-bottom: 10px; font-weight: 500; text-transform: uppercase; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-right: 15px; accent-color: #ff0000; }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .setlist-sidebar { border-left: none; border-top: 2px solid #ff0000; width: 100%; }
            h1 { font-size: 3rem; }
            .oor { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <audio id="themeSong" loop><source src="lagu1.mp3" type="audio/mpeg"></audio>

    <div class="main-wrapper">
        <div class="container">
            <h1>
                <span class="lilas">LILAS</span>
                <span class="oor">TO ONE OK ROCK</span>
            </h1>
            
            <div class="card">
                <h3>JAKARTA , INDONESIA ARENA STADIUM COUNTDOWN</h3>
                <div class="timer-grid">
                    <div class="timer-box"><span id="days">00</span><small>DAYS</small></div>
                    <div class="timer-box"><span id="hours">00</span><small>HOURS</small></div>
                    <div class="timer-box"><span id="minutes">00</span><small>MINS</small></div>
                    <div class="timer-box"><span id="seconds">00</span><small>SECS</small></div>
                </div>
            </div>

            <div class="card">
                <h3>DAILY MISSION</h3>
                <div class="item"><input type="checkbox"> PUSH UP 50X</div>
                <div class="item"><input type="checkbox"> WEIGHT LIFTING</div>
                <div class="item"><input type="checkbox"> CARDIO BATTLE</div>
                <div class="item"><input type="checkbox"> NO SNACKS!</div>
                <button onclick="alert('Session Saved!')">COMPLETE BATTLE</button>
            </div>
        </div>

        <div class="setlist-sidebar">
            <div class="setlist-title">SETLIST DETOX TOUR ASIA 2026 </div>
            <div id="setlist-content"></div>
        </div>
    </div>

    <script>
        const song = document.getElementById('themeSong');
        document.body.addEventListener('click', () => { if (song.paused) song.play(); }, { once: true });

        const setlist = [
            "Puppets Can’t Control You", "The Beginning", "Save Yourself",
            "NASTY", "Renegades", "Party’s Over", "Tiny Pieces",
            "Wherever You Are", "Make It Out Alive", "Instrumental Solo",
            "Dystopia", "Delusion:All", "Stand Out Fit In", 
            "Kimishidai Ressha", "The Pilot </3",
            "ENCORE: +Matter", "ENCORE: We Are",
            "ENCORE 2: Kanzen Kankaku Dreamer"
        ];

        function initSetlist() {
            const container = document.getElementById('setlist-content');
            setlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                if(track.includes("ENCORE")) div.classList.add('encore-label');
                div.innerText = track;
                container.appendChild(div);
                setTimeout(() => { div.classList.add('show'); }, 100 + (index * 250)); 
            });
        }

        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            document.getElementById("days").innerText = Math.floor(dist / 86400000);
            document.getElementById("hours").innerText = Math.floor((dist % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((dist % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((dist % 60000) / 1000);
        }, 1000);

        window.onload = initSetlist;
    </script>
</body>
</html>
