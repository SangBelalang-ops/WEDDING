<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78 FIT - Official Detox Tour 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Anek+Malayalam:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* BASE STYLE: Cyberpunk Neon */
        body {
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.7);
            background-blend-mode: darken;
            /* Font dasar diganti jadi tajam/modern */
            font-family: 'Anek Malayalam', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            cursor: pointer;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
        }

        .container { width: 100%; max-width: 420px; position: relative; z-index: 10; }

        /* --- H1: ANIMASI PUTIH BERSINAR LEWAT --- */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 5rem;
            color: #ffffff;
            text-align: center;
            margin: 0 0 10px 0;
            letter-spacing: 5px;
            position: relative;
            display: inline-block;
            width: 100%;
            /* Glow dasar bernafas */
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8), 0 0 30px rgba(0, 255, 255, 0.5);
            animation: neonPulse 4s ease-in-out infinite;
            overflow: hidden; /* Wajib buat animasi lewat */
        }

        /* Pseudo-element buat cahaya tajam lewat */
        h1::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
            transform: skewX(-30deg); /* Bikin cahayanya miring tajam */
            animation: shineThrough 6s infinite;
        }

        /* Animasi cahaya lewat */
        @keyframes shineThrough {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        /* Animasi Glow Neon Nafas */
        @keyframes neonPulse {
            0% { text-shadow: 0 0 15px rgba(0, 255, 255, 0.7); }
            50% { text-shadow: 0 0 25px rgba(0, 255, 255, 1), 0 0 40px rgba(255, 255, 255, 0.8); }
            100% { text-shadow: 0 0 15px rgba(0, 255, 255, 0.7); }
        }

        /* --- SETLIST SIDEBAR --- */
        .setlist-sidebar {
            flex: 1;
            padding-top: 10px;
            text-align: left;
            min-width: 300px;
        }

        .setlist-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #00ffff; /* Cyan Neon */
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ffff;
            border-bottom: 2px solid #00ffff;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .song-list-scroll {
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 10px;
        }
        /* Custom Scrollbar */
        .song-list-scroll::-webkit-scrollbar { width: 5px; }
        .song-list-scroll::-webkit-scrollbar-thumb { background: #00ffff; border-radius: 10px; }

        .song-item {
            font-family: 'Anek Malayalam', sans-serif; /* Pake font basic biar tajam */
            font-weight: 700;
            font-size: 1.1rem;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
            margin-bottom: 8px;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.5s ease-out;
            line-height: 1.3;
        }

        .song-item.show { opacity: 1; transform: translateX(0); }
        .encore-label { color: #00ffff; font-size: 1.3rem; margin-top: 15px; font-family: 'Orbitron', sans-serif; }

        /* --- CARD STYLE (Blue Neon) --- */
        .card {
            backdrop-filter: blur(15px);
            background: rgba(10, 10, 20, 0.85); /* Agak kebiruan */
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px solid #111;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            animation: borderGlowBlue 4s ease-in-out infinite;
        }

        @keyframes borderGlowBlue { 
            50% { border-color: #00ffff; box-shadow: 0 0 20px rgba(0,255,255,0.3); } 
        }

        h3 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem; 
            color: #00ffff; 
            margin-top: 0; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px #00ffff;
        }

        /* --- TIMER --- */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .timer-box { background: rgba(0, 255, 255, 0.05); padding: 10px; border-radius: 10px; border: 1px solid rgba(0, 255, 255, 0.2); }
        .timer-box span { 
            font-family: 'Orbitron', sans-serif;
            display: block; 
            font-size: 24px; 
            color: #ffffff; 
            text-shadow: 0 0 10px #00ffff; 
        }
        .timer-box small { font-size: 9px; text-transform: uppercase; }

        /* --- BUTTONS --- */
        button {
            font-family: 'Orbitron', sans-serif;
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: linear-gradient(45deg, #00ffff, #0055ff); /* Gradient Button */
            color: white; font-size: 1.3rem; cursor: pointer; transition: 0.3s;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0,255,255,0.2);
        }
        button:hover { background: #ffffff; color: #000000; box-shadow: 0 5px 25px rgba(0,255,255,0.5); }
        
        input[type="number"] {
            font-family: 'Orbitron', sans-serif;
            width: 80%; padding: 8px; margin: 10px 0; border-radius: 8px;
            background: rgba(0,0,0,0.7); color: #00ffff; text-align: center; font-size: 2.2rem; border: 1px solid #333;
        }
        input[type="number"]:focus { border-color: #00ffff; outline: none; }

        /* --- CHECKLIST --- */
        .checklist { text-align: left; }
        .item { font-family: 'Orbitron', sans-serif; display: flex; align-items: center; margin-bottom: 8px; font-size: 1.2rem; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: #00ffff; }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .setlist-sidebar { padding-top: 30px; text-align: center; width: 100%; }
            .song-list-scroll { max-height: none; overflow: visible; }
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <audio id="themeSong" loop><source src="lagu1.mp3" type="audio/mpeg"></audio>

    <div class="main-wrapper">
        <div class="container">
            <h1>78 FIT</h1>
            
            <div class="card">
                <h3>DETOX TOUR JAKARTA</h3>
                <div class="timer-grid">
                    <div class="timer-box"><span id="days">00</span><small>Days</small></div>
                    <div class="timer-box"><span id="hours">00</span><small>Hours</small></div>
                    <div class="timer-box"><span id="minutes">00</span><small>Min</small></div>
                    <div class="timer-box"><span id="seconds">00</span><small>Sec</small></div>
                </div>
            </div>

            <div class="card">
                <h3>TARGET: 78.0 KG</h3>
                <div id="lastWeight" style="color:#00ffff; font-size:3.5rem; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px #00ffff; margin-bottom: 5px;">--</div>
                <input type="number" id="currentWeight" step="0.1" placeholder="ENTER WEIGHT">
                <button onclick="updateWeight()">SAVE PROGRESS</button>
            </div>

            <div class="card checklist">
                <h3 style="text-align: center;">DAILY MISSION</h3>
                <div class="item"><input type="checkbox"> PUSH UP 50X</div>
                <div class="item"><input type="checkbox"> WEIGHT LIFTING</div>
                <div class="item"><input type="checkbox"> CARDIO BATTLE</div>
                <div class="item"><input type="checkbox"> NO SNACKS!</div>
            </div>
        </div>

        <div class="setlist-sidebar">
            <div class="setlist-title">DETOX TOUR ASIA 2026 SETLIST:</div>
            <div class="song-list-scroll" id="setlist-content"></div>
        </div>
    </div>

    <script>
        const song = document.getElementById('themeSong');
        document.body.addEventListener('click', () => { if (song.paused) song.play(); }, { once: true });

        // TRUE SETLIST
        const setlist = [
            "1. Puppets Can’t Control You (JP)", "2. The Beginning", "3. Save Yourself (JP)",
            "4. NASTY", "5. Renegades (JP)", "6. Party’s Over",
            "7. Tiny Pieces", "8. Wherever You Are", "9. Make It Out Alive",
            "10. Instrumental Solo", "11. C.U.R.I.O.S.I.T.Y.", "12. Dystopia (JP)",
            "13. Delusion:All", "14. Stand Out Fit In (JP)", "15. Kimishidai Ressha",
            "16. Tropical Therapy", "17. The Pilot </3", 
            "--- ENCORE ---",
            "18. +Matter", "19. We Are (JP)",
            "--- ENCORE 2 ---",
            "20. Kanzen Kankaku Dreamer"
        ];

        function initSetlist() {
            const container = document.getElementById('setlist-content');
            setlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                if(track.includes("ENCORE")) div.classList.add('encore-label');
                div.innerText = track;
                container.appendChild(div);
                setTimeout(() => { div.classList.add('show'); }, 500 + (index * 600)); 
            });
        }

        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            document.getElementById("days").innerText = Math.floor(dist / 86400000);
            document.getElementById("hours").innerText = Math.floor((dist % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((dist % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((dist % 60000) / 1000);
        }, 1000);

        function updateWeight() {
            const w = document.getElementById("currentWeight").value;
            if(w) { localStorage.setItem("w78", w); document.getElementById("lastWeight").innerText = w + " KG"; }
        }

        window.onload = () => {
            const saved = localStorage.getItem("w78");
            if(saved) document.getElementById("lastWeight").innerText = saved + " KG";
            initSetlist();
        };
    </script>
</body>
</html>
