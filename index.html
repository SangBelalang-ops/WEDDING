<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Piter Andreas Sinaga & Pasangan</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --dark: #2c3e50; --pink: #ffb6c1; --glass: rgba(255, 255, 255, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            font-family: 'Poppins', sans-serif; color: var(--dark); overflow-x: hidden; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://i.postimg.cc/mcDgQ8jv/utma.jpg') fixed center/cover;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%23b8860b" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'), auto;
        }
        .sakura { position: fixed; top: -10%; background: var(--pink); border-radius: 100% 0 100% 0; opacity: 0.8; z-index: 9999; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--glass); padding: 10px 20px; border-radius: 30px; display: flex; gap: 15px; z-index: 1000; border: 1px solid var(--gold); backdrop-filter: blur(5px); }
        nav a { text-decoration: none; color: var(--dark); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        section { padding: 80px 20px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin: 15px 0; }
        
        /* OPREK CSS GALLERY BIAR FOTO BESAR & JELAS */
        #gallery { background: var(--glass); backdrop-filter: blur(8px); }
        .gallery-grid { 
            display: grid; 
            /* Mode repeat autofit: Atur minimal lebar 350px (Lebih Besar) */
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 25px; /* Jarak antar foto diperlebar */
            max-width: 1300px; /* Max lebar container diperbesar */
            margin: 30px auto; 
            padding: 20px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 6px solid white; /* Bingkai dipertebal biar mewah */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); /* Bayangan dipertegas */
            transition: 0.3s;
            cursor: zoom-in;
        }
        .gallery-item img { 
            width: 100%; 
            height: 450px; /* TINGGI FOTO DIPERBESAR TOTAL (Dulu 250px) */
            object-fit: cover; /* Biar foto pas di kotak, nggak gepeng */
            transition: 0.5s; 
        }
        .gallery-item:hover {
            transform: translateY(-5px); /* Efek melayang pas kursor nempel */
            border-color: var(--gold);
        }
        .gallery-item:hover img { 
            transform: scale(1.1); /* Efek zoom-in pas kursor nempel */
        }
        /* Mobile adjustment */
        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: 1fr; gap: 15px; padding: 10px; }
            .gallery-item img { height: 350px; } /* Di HP tinggi dikurangi dikit biar pas */
        }

        #wish { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(5px); }
        form { max-width: 450px; margin: 0 auto 30px; background: white; padding: 25px; border-radius: 15px; text-align: left; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        button { width: 100%; background: var(--gold); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .wish-container { max-width: 450px; margin: 0 auto; max-height: 350px; overflow-y: auto; text-align: left; }
        .wish-card { background: white; padding: 15px; border-radius: 10px; border-left: 5px solid var(--gold); margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bank-card { background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--gold); max-width: 380px; margin: 20px auto; }
    </style>
</head>
<body>
    <nav><a href="#home">Home</a><a href="#gallery">Gallery</a><a href="#wish">Ucapan</a><a href="#gift">Kado</a></nav>

    <section id="home" style="color:white">
        <p>THE WEDDING OF</p>
        <h1>Piter Andreas Sinaga<br>& Pasangan</h1>
        <p>( MASIH DICARI )</p>
        <div style="font-size: 1.5rem; margin-top: 10px; font-weight: 600;">16 April 2026</div>
    </section>

    <section id="gallery">
        <h2 style="font-family:'Dancing Script'; font-size:3rem; color:var(--gold); margin-bottom:20px;">Gallery</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://i.postimg.cc/y3WmtmVc/1.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/xcJGP3x4/2.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/v45WJHd4/3.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/PpVZWCmj/4.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/nXfmGbQc/5.jpg"></div>
        </div>
    </section>

    <section id="wish">
        <h2 style="font-family:'Dancing Script'; font-size:3rem; color:var(--gold); margin-bottom:20px;">Wish</h2>
        <form id="guestbook">
            <input type="text" id="nama" placeholder="Nama" required>
            <textarea id="pesan" placeholder="Ucapan..." rows="3" required></textarea>
            <button type="submit" id="btnKirim">Kirim Ucapan</button>
        </form>
        <div id="display-wish" class="wish-container"></div>
    </section>

    <section id="gift">
        <div class="bank-card">
            <p><strong>BCA</strong></p>
            <p style="font-size: 1.6rem; font-weight: 600; color: var(--gold);">3491684397</p>
            <p>a.n Piter Andreas Sinaga</p>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // CONFIG
        const config = {
            apiKey: "AIzaSyCtmSRH_Y1NtGaN1VNLb-1jfQaMum5lOPk",
            authDomain: "wedding-f13d8.firebaseapp.com",
            projectId: "wedding-f13d8",
            storageBucket: "wedding-f13d8.firebasestorage.app",
            messagingSenderId: "933008597878",
            appId: "1:933008597878:web:77d64d919b3bad44ded057",
            databaseURL: "https://wedding-f13d8-default-rtdb.firebaseio.com/"
        };

        // INIT
        firebase.initializeApp(config);
        const db = firebase.database();

        // TOMBOL KIRIM
        const form = document.getElementById('guestbook');
        const btn = document.getElementById('btnKirim');

        form.onsubmit = function(e) {
            e.preventDefault();
            console.log("Tombol diklik!"); 
            
            const n = document.getElementById('nama').value;
            const p = document.getElementById('pesan').value;

            btn.disabled = true;
            btn.innerText = "Sabar, lagi ngirim...";

            db.ref('wishes').push({
                nama: n,
                pesan: p,
                waktu: Date.now()
            })
            .then(() => {
                console.log("Berhasil!");
                alert("Terkirim, Bree!");
                form.reset();
                btn.disabled = false;
                btn.innerText = "Kirim Ucapan";
            })
            .catch((err) => {
                console.error(err);
                alert("Gagal: " + err.message + "\nPastikan Rules Firebase sudah di-Publish!");
                btn.disabled = false;
                btn.innerText = "Kirim Ucapan";
            });
        };

        // BACA DATA
        db.ref('wishes').on('value', (snap) => {
            const data = snap.val();
            const box = document.getElementById('display-wish');
            box.innerHTML = '';
            if (data) {
                Object.values(data).reverse().forEach(v => {
                    box.innerHTML += `<div class="wish-card"><strong>${v.nama}</strong><p>${v.pesan}</p></div>`;
                });
            }
        });

        // SAKURA
        setInterval(() => {
            const s = document.createElement('div');
            s.className = 'sakura';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.width = s.style.height = (Math.random() * 10 + 10) + 'px';
            s.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }, 300);
    </script>
</body>
</html>
