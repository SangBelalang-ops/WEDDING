<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78 FIT - Road to OOR Jakarta</title>
    <style>
        body {
            /* BACKGROUND GIF ONE OK ROCK */
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.7);
            background-blend-mode: darken;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 71, 87, 0.4);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 3.5rem; color: #ff4757; text-shadow: 0 0 15px #ff4757; margin: 10px 0; letter-spacing: 5px; }
        
        /* TIMER */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .timer-box { background: rgba(255, 71, 87, 0.2); padding: 10px; border-radius: 10px; border: 1px solid #ff4757; }
        .timer-box span { display: block; font-size: 22px; font-weight: bold; color: #f1c40f; }
        .timer-box small { font-size: 9px; text-transform: uppercase; opacity: 0.8; }

        /* BUTTONS */
        button {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px 0;
        }
        .btn-red { background: #ff4757; color: white; }
        .btn-green { background: #2ecc71; color: white; font-size: 1.1rem; }
        .btn-music { background: rgba(241, 196, 15, 0.2); color: #f1c40f; border: 1px solid #f1c40f; width: 48%; }
        
        input[type="number"] {
            width: 80%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: none; background: #333; color: white; text-align: center; font-size: 1.2rem;
        }

        /* CHECKLIST */
        .checklist { text-align: left; }
        .item { display: flex; align-items: center; margin-bottom: 12px; font-size: 1.1rem; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 15px; accent-color: #ff4757; }
    </style>
</head>
<body>

    <div class="container">
        <h1>78 FIT</h1>
        <p style="font-style: italic; opacity: 0.7; margin-bottom: 20px;">"Make it to the top!"</p>

        <div class="card">
            <h3 style="margin-top:0; color:#f1c40f;">🎧 GYM ANTHEM</h3>
            <audio id="audioPlayer" loop>
                <source id="audioSource" src="lagu1.mp3" type="audio/mpeg">
            </audio>
            <div style="display: flex; justify-content: space-between;">
                <button class="btn-music" onclick="changeTrack('lagu1.mp3')">TRACK 1</button>
                <button class="btn-music" onclick="changeTrack('lagu2.mp3')">TRACK 2</button>
            </div>
            <button id="playBtn" class="btn-green" style="margin-top:15px;" onclick="togglePlay()">▶ PLAY MUSIC</button>
        </div>

        <div class="card">
            <h3 style="margin:0;">ROAD TO ONE OK ROCK JKT</h3>
            <div class="timer-grid">
                <div class="timer-box"><span id="days">00</span><small>Hari</small></div>
                <div class="timer-box"><span id="hours">00</span><small>Jam</small></div>
                <div class="timer-box"><span id="minutes">00</span><small>Menit</small></div>
                <div class="timer-box"><span id="seconds">00</span><small>Detik</small></div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0;">TARGET: 78.0 KG</h3>
            <p>Berat Terakhir: <span id="lastWeight" style="color:#2ecc71; font-weight:bold; font-size:1.4rem;">--</span> kg</p>
            <input type="number" id="currentWeight" step="0.1" placeholder="Berat hari ini">
            <button class="btn-red" onclick="updateWeight()">SIMPAN PROGRESS</button>
        </div>

        <div class="card checklist">
            <h3 style="text-align: center; margin-top:0;">DAILY BATTLE</h3>
            <div class="item"><input type="checkbox"> Push Up 50x</div>
            <div class="item"><input type="checkbox"> Angkat Dumbbell</div>
            <div class="item"><input type="checkbox"> Cardio 15 Menit</div>
            <div class="item"><input type="checkbox"> No Snacks (Kacang Arab No!)</div>
        </div>
    </div>

    <script>
        // MUSIC LOGIC
        const audio = document.getElementById('audioPlayer');
        const audioSource = document.getElementById('audioSource');
        const playBtn = document.getElementById('playBtn');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = "⏸ PAUSE";
                playBtn.style.background = "#e67e22";
            } else {
                audio.pause();
                playBtn.innerHTML = "▶ PLAY MUSIC";
                playBtn.style.background = "#2ecc71";
            }
        }

        function changeTrack(fileName) {
            audioSource.src = fileName;
            audio.load();
            audio.play();
            playBtn.innerHTML = "⏸ PAUSE";
            playBtn.style.background = "#e67e22";
        }

        // COUNTDOWN LOGIC
        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }, 1000);

        // STORAGE LOGIC
        function updateWeight() {
            const w = document.getElementById("currentWeight").value;
            if(w) {
                localStorage.setItem("weight78", w);
                document.getElementById("lastWeight").innerText = w;
                alert("Gas terus, Bos! Progress aman.");
            }
        }
        window.onload = function() {
            const saved = localStorage.getItem("weight78");
            if(saved) document.getElementById("lastWeight").innerText = saved;
        }
    </script>
</body>
</html>
