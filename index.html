<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78 FIT - Detox Tour 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rock+Salt&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('https://i.postimg.cc/Xq5zhmX4/giphy-(3).gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.7);
            background-blend-mode: darken;
            font-family: 'Bebas Neue', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            cursor: pointer;
            overflow-x: hidden;
        }

        /* LAYOUT UTAMA: Flexbox buat naruh setlist di samping */
        .main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 40px;
            max-width: 900px;
            width: 100%;
        }

        .container { width: 100%; max-width: 450px; position: relative; z-index: 10; }

        /* SETLIST SIDEBAR */
        .setlist-sidebar {
            flex: 1;
            padding-top: 100px; /* Biar sejajar sama bawah judul */
            text-align: left;
            min-width: 200px;
        }

        .setlist-title {
            font-family: 'Rock Salt', cursive;
            font-size: 1.2rem;
            color: #f1c40f;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f1c40f;
        }

        .song-item {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.2rem;
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff, 0 0 15px #ffffff;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.8s ease-out;
        }

        .song-item.show {
            opacity: 1;
            transform: translateX(0);
        }

        /* STYLE KARTU & TYPOGRAPHY */
        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 4rem;
            color: #ff4757;
            text-shadow: 4px 4px 0px #000, 0 0 20px rgba(255, 71, 87, 0.8);
            margin: 0;
            transform: rotate(-3deg);
            text-align: center;
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(20, 20, 20, 0.8);
            padding: 25px;
            border-radius: 25px;
            margin-top: 25px;
            border: 2px solid #333;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            animation: borderGlow 5s ease-in-out infinite;
        }

        @keyframes borderGlow { 50% { border-color: #ff4757; } }

        h3 { font-size: 1.8rem; color: #f1c40f; margin-top: 0; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .timer-box span { display: block; font-size: 24px; color: #ffffff; text-shadow: 2px 2px 5px #ff4757; }

        button {
            font-family: 'Bebas Neue', sans-serif;
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: #ff4757; color: white; font-size: 1.4rem; cursor: pointer; transition: 0.3s;
            letter-spacing: 2px;
        }
        button:hover { background: #ffffff; color: #ff4757; }
        
        input[type="number"] {
            font-family: 'Bebas Neue', sans-serif;
            width: 80%; padding: 10px; margin: 10px 0; border-radius: 10px;
            background: rgba(0,0,0,0.5); color: #2ecc71; text-align: center; font-size: 2rem; border: 1px solid #333;
        }

        .checklist { text-align: left; }
        .item { display: flex; align-items: center; margin-bottom: 10px; font-size: 1.3rem; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: #ff4757; }

        /* Responsive: Kalau layar kecil, setlist pindah ke bawah */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .setlist-sidebar { padding-top: 20px; text-align: center; }
        }
    </style>
</head>
<body>

    <audio id="themeSong" loop><source src="lagu1.mp3" type="audio/mpeg"></audio>

    <div class="main-wrapper">
        <div class="container">
            <h1>78 FIT</h1>
            <div class="card">
                <h3>ROAD TO STADIUM</h3>
                <div class="timer-grid">
                    <div class="timer-box"><span id="days">00</span><small>Days</small></div>
                    <div class="timer-box"><span id="hours">00</span><small>Hours</small></div>
                    <div class="timer-box"><span id="minutes">00</span><small>Min</small></div>
                    <div class="timer-box"><span id="seconds">00</span><small>Sec</small></div>
                </div>
            </div>

            <div class="card">
                <h3>TARGET: 78.0 KG</h3>
                <div id="lastWeight" style="color:#2ecc71; font-size:3rem; margin-bottom: 5px;">--</div>
                <input type="number" id="currentWeight" step="0.1" placeholder="ENTER WEIGHT">
                <button onclick="updateWeight()">SAVE PROGRESS</button>
            </div>

            <div class="card checklist">
                <h3 style="text-align: center;">DAILY MISSION</h3>
                <div class="item"><input type="checkbox"> PUSH UP 50X</div>
                <div class="item"><input type="checkbox"> WEIGHT LIFTING</div>
                <div class="item"><input type="checkbox"> CARDIO BATTLE</div>
                <div class="item"><input type="checkbox"> NO SNACKS!</div>
            </div>
        </div>

        <div class="setlist-sidebar">
            <div class="setlist-title">DETOX TOUR ASIA 2026 SETLIST:</div>
            <div id="setlist-content"></div>
        </div>
    </div>

    <script>
        const song = document.getElementById('themeSong');
        document.body.addEventListener('click', () => { if (song.paused) song.play(); }, { once: true });

        const setlist = [
            "1. Save Yourself", "2. Taking Off", "3. Wonder",
            "4. Let Me Let You Go", "5. Renegades", "6. Neon",
            "7. Vandalize", "8. Broken Heart", "9. Mighty Long Fall",
            "10. The Beginning", "11. Wasted Nights", "ENCORE: Stand Out Fit In"
        ];

        // LOGIKA MUNCULIN SETLIST SATU PER SATU
        function initSetlist() {
            const container = document.getElementById('setlist-content');
            setlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerText = track;
                container.appendChild(div);

                // Munculin satu-satu dengan delay
                setTimeout(() => {
                    div.classList.add('show');
                }, 1000 + (index * 1500)); // Delay per lagu 1.5 detik
            });
        }

        // TIMER LOGIC
        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            document.getElementById("days").innerText = Math.floor(dist / 86400000);
            document.getElementById("hours").innerText = Math.floor((dist % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((dist % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((dist % 60000) / 1000);
        }, 1000);

        function updateWeight() {
            const w = document.getElementById("currentWeight").value;
            if(w) { localStorage.setItem("w78", w); document.getElementById("lastWeight").innerText = w + " KG"; }
        }

        window.onload = () => {
            const saved = localStorage.getItem("w78");
            if(saved) document.getElementById("lastWeight").innerText = saved + " KG";
            initSetlist();
        };
    </script>
</body>
</html>
